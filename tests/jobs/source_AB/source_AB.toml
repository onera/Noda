[databases]
thermo = "fcc-AB-thermo-ideal.csv"
mobility = "fcc-AB-mob-ideal.csv"

[system]
components = "A, B"
phases = "fcc"

[temperature]
TC = 1000

[time]
th = 1

[space]
grid_type = "geometric"
q = 1.02
zmin = 0
zmax = 1e-4
nz = 60

[initial_conditions]
[initial_conditions.atom_fraction]
shape = "flat"
left.B = 1e-4

[boundary_conditions]
left.atom_fraction.B = 0.3
right.atom_fraction.B = 1e-4

[options]

# Space discretization
stencil = "G"
